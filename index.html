
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NexusPet">
    <meta name="theme-color" content="#f97316">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/620/620851.png">
    
    <title>NexusPet - PDV Pet Shop</title>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // ESSENCIAL: Configura o Tailwind para reconhecer a classe 'dark'
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              inter: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Libre+Barcode+128&family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a;
        margin: 0;
        overflow: hidden;
      }
      
      /* Ajuste dinâmico da cor do body para evitar flashes brancos */
      html.dark body {
        background-color: #020617;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #334155;
      }

      .barcode {
        font-family: 'Libre Barcode 128', cursive;
        font-size: 40px;
        line-height: 1;
      }
      .font-mono-receipt {
        font-family: 'Inconsolata', monospace;
      }

      @media print {
        html, body {
          height: auto !important;
          overflow: visible !important;
          background-color: white !important;
          color: black !important;
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
          width: 58mm !important;
          margin: 0 !important;
          padding: 0 !important;
        }
        @page { margin: 0; size: 58mm auto; }

        /* Oculta tudo por padrão na impressão */
        aside, header, main, .receipt-modal-wrapper, .print\:hidden {
          display: none !important;
          visibility: hidden !important;
        }

        /* Mostra apenas o que for solicitado via classe no body */
        body.printing-labels main {
          display: block !important;
          visibility: visible !important;
          width: 58mm !important;
        }

        body.printing-labels section {
          display: block !important;
          visibility: visible !important;
          padding: 0 !important;
          margin: 0 !important;
        }

        body.printing-labels .print\:block {
          display: block !important;
          visibility: visible !important;
        }

        body.printing-receipt .receipt-modal-wrapper {
          display: block !important;
          visibility: visible !important;
          position: static !important;
          width: 58mm !important;
          background-color: white !important;
        }

        .receipt-modal-wrapper * {
          color: black !important;
          text-shadow: none !important;
          box-shadow: none !important;
          background-color: transparent !important;
        }

        .receipt-modal-wrapper > div {
          box-shadow: none !important;
          border: none !important;
          width: 58mm !important;
          margin: 0 !important;
          border-radius: 0 !important;
        }

        /* Otimização para o código de barras */
        .barcode {
          image-rendering: -webkit-optimize-contrast;
          image-rendering: crisp-edges;
          color: black !important;
        }
      }

      #root:empty::before {
        content: "🐾 NexusPet: Carregando...";
        display: flex;
        position: fixed;
        inset: 0;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        background: #0f172a;
      }
    </style>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(registration => {
            console.log('NexusPet: Offline Active');
          });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
